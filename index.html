<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3rd Grade Spelling Tutor</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #f0f8ff; text-align: center; }
        h1 { color: #ff4500; font-size: 36px; margin-bottom: 5px; }
        .card { background-color: white; padding: 30px; border-radius: 15px; margin: 20px auto; max-width: 700px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        .btn-start { background-color: #d84315; color: white; padding: 20px 40px; font-size: 28px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 0 #bf360c; }
        .btn-start:active { transform: translateY(5px); box-shadow: none; }
        .btn-audio { background-color: #2196f3; color: white; padding: 15px 25px; font-size: 24px; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .btn-audio:disabled { background-color: #90caf9; cursor: not-allowed; box-shadow: none; }
        .mode-badge { background-color: #4caf50; color: white; padding: 5px 15px; border-radius: 20px; font-size: 16px; font-weight: bold; letter-spacing: 2px; display: inline-block; margin-bottom: 10px; }
        select { font-size: 20px; padding: 10px; border-radius: 10px; margin-bottom: 20px; border: 2px solid #ccc; font-family: inherit; }
        #wordDisplay { font-size: 60px; font-weight: bold; color: #4b0082; letter-spacing: 4px; min-height: 90px; margin: 20px 0; }
        #message { font-size: 28px; font-weight: bold; margin-top: 10px; min-height: 40px; color: #ff9800; }
        #clueDisplay { font-size: 24px; font-weight: bold; color: #1976d2; min-height: 35px; margin-top: 5px; padding: 10px; background: #e3f2fd; border-radius: 10px; display: none; }
        #livesDisplay { font-size: 30px; margin-bottom: 15px; }
        .key { background-color: #e0e0e0; border: 2px solid #ccc; border-radius: 8px; font-size: 24px; padding: 10px 15px; margin: 5px; cursor: pointer; font-weight: bold; }
        .key:active { background-color: #d0d0d0; }
        .correct-choice { background-color: #4caf50 !important; color: white; border-color: #388e3c; }
        .wrong-choice { background-color: #f44336 !important; color: white; border-color: #d32f2f; }
        #gameArea, #reviewArea, #endScreen { display: none; }
        .review-btn { display: block; width: 80%; max-width: 400px; margin: 15px auto; padding: 20px; font-size: 32px; background-color: #e3f2fd; border: 3px solid #2196f3; color: #0d47a1; border-radius: 15px; cursor: pointer; font-family: monospace; font-weight: bold; box-shadow: 0 5px 0 #1976d2; text-transform: uppercase; }
        .report-card { border: 4px dashed #4caf50; padding: 20px; border-radius: 15px; background: #f1f8e9; margin: 20px 0; }
        .report-score { font-size: 48px; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <div class="mode-badge">📝 3RD GRADE SPELLING</div>
        <h1>Summer Practice!</h1>
        <p style="font-size: 20px; color: #555;">Select a word group to begin:</p>
        
        <select id="categorySelect"></select><br>

        <button class="btn-start" onclick="startGame()">Start spelling! ▶️</button>
    </div>

    <div class="card" id="gameArea">
        <div id="livesDisplay">❤️❤️❤️❤️❤️❤️</div>
        <button class="btn-audio" id="audioBtn" onclick="playCurrentAudio()">🔊 Listen to Word</button>
        <div id="wordDisplay">_ _ _ _ _</div>
        <div id="clueDisplay"></div>
        <div id="message"></div>
        <div id="keyboard"></div>
        <button id="nextBtn" class="btn-start" style="display: none; margin: auto; margin-top: 20px; background-color: #4caf50; box-shadow: 0 5px 0 #2e7d32;" onclick="processNext()">Next Word ➡️</button>
    </div>

    <div class="card" id="reviewArea">
        <h1>🔍 Visual Review</h1>
        <p style="font-size: 24px; color: #555;">Let's review! Which one is spelled correctly?</p>
        <button class="btn-audio" id="reviewAudioBtn" onclick="playCurrentAudio()">🔊 Listen to Word</button>
        <div id="reviewOptions"></div>
        <button id="nextReviewBtn" class="btn-start" style="display: none; margin: auto; margin-top: 20px; background-color: #4caf50; box-shadow: 0 5px 0 #2e7d32;" onclick="nextReview()">Continue ➡️</button>
    </div>

    <div class="card" id="endScreen">
        <h1>🎉 Practice Complete! 🎉</h1>
        <div class="report-card">
            <h2>Parent Report Card</h2>
            <p style="font-size: 18px; color: #555;">Perfect on the very first try:</p>
            <div class="report-score" id="reportScore">0 / 0</div>
            <p style="font-size: 16px; margin-top: 10px;" id="reportMessage"></p>
        </div>
        <button class="btn-start" onclick="location.reload()">Play Again 🔄</button>
    </div>

    <script>
        // Pre-Generated Dictionary of Grouped Words and Hints
        const spellingDictionary = {
            "Beach Days": {
                "ocean": "Hint: The 'sh' sound in the middle is secretly spelled with a C.",
                "castle": "Hint: The soft 's' sound is made by an S and a silent T.",
                "bucket": "Hint: Remember, the 'k' sound in the middle is C-K.",
                "breeze": "Hint: It has a double E, and don't forget the silent E at the very end!"
            },
            "Camping Trip": {
                "forest": "Hint: It spells exactly how it sounds: for-est.",
                "nature": "Hint: The 'chur' sound at the end is spelled T-U-R-E.",
                "lantern": "Hint: Break it into two chunks: lan - tern.",
                "smore": "Hint: It has a silent E at the end!"
            },
            "Summer Action": {
                "swimming": "Hint: Watch out! You need a double M in the middle.",
                "travel": "Hint: It ends with E-L, not A-L.",
                "explore": "Hint: Starts with E-X-P, and ends with a silent E.",
                "vacation": "Hint: The 'shun' sound at the end is spelled T-I-O-N."
            }
        };

        let currentQueue = [];
        let missedWordsQueue = [];         
        let currentWordIndex = 0;
        let currentWord = "";
        let currentCategory = "";
        let currentLetterIndex = 0;         
        let mistakes = 0;
        let mistakesOnCurrentLetter = 0;
        let wordFailedThisRound = false;
        
        let totalWordsToSpell = 0;
        let firstTryPerfectCount = 0;
        let isFirstPass = true; 

        let currentAudio = null; 

        // Populate the dropdown menu on load
        window.onload = function() {
            const select = document.getElementById('categorySelect');
            for (let category in spellingDictionary) {
                let option = document.createElement('option');
                option.value = category;
                option.innerText = category;
                select.appendChild(option);
            }
        };

        function startGame() {
            currentCategory = document.getElementById('categorySelect').value;
            // Get all the words for the selected category
            currentQueue = Object.keys(spellingDictionary[currentCategory]);
            totalWordsToSpell = currentQueue.length;
            
            startSpellingPhase();
        }

        function startSpellingPhase() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('reviewArea').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            currentWordIndex = 0;
            missedWordsQueue = [];
            loadWord();
        }

        function loadWord() {
            currentWord = currentQueue[currentWordIndex].toUpperCase();
            currentLetterIndex = 0;
            mistakes = 0;
            mistakesOnCurrentLetter = 0;
            wordFailedThisRound = false;
            
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('message').innerText = "";
            document.getElementById('clueDisplay').style.display = "none";
            document.getElementById('keyboard').style.pointerEvents = "auto";
            
            updateLivesDisplay();
            updateWordDisplay();
            buildKeyboard();

            // Load local audio file
            let wordLower = currentWord.toLowerCase();
            currentAudio = new Audio(`audio/${wordLower}.wav`); // Change .wav to .mp3 here if needed
            document.getElementById('audioBtn').disabled = false;
            
            playCurrentAudio();
        }

        function playCurrentAudio() {
            if(currentAudio) {
                currentAudio.currentTime = 0;
                currentAudio.play().catch(e => console.log("Audio file missing or blocked by browser:", e));
            }
        }

        function updateWordDisplay() {
            let displayString = "";
            for (let i = 0; i < currentWord.length; i++) {
                if (i < currentLetterIndex) displayString += (currentWord[i] === " " ? "\xa0\xa0" : currentWord[i]) + " ";
                else displayString += "_ ";
            }
            document.getElementById('wordDisplay').innerText = displayString.trim();

            if (currentLetterIndex === currentWord.length) {
                document.getElementById('message').innerText = wordFailedThisRound ? "Good job!" : "✅ Perfect!";
                document.getElementById('keyboard').style.pointerEvents = "none";
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        function updateLivesDisplay() {
            let livesLeft = 6 - mistakes;
            let heartString = "";
            for(let i=0; i<livesLeft; i++) heartString += "❤️";
            for(let i=0; i<mistakes; i++) heartString += "🖤";
            document.getElementById('livesDisplay').innerText = heartString;
        }

        function triggerHint() {
            let clueDiv = document.getElementById('clueDisplay');
            clueDiv.style.display = "block";
            
            // Pull the exact hint for this word from the dictionary
            let wordLower = currentWord.toLowerCase();
            let specificHint = spellingDictionary[currentCategory][wordLower];
            
            clueDiv.innerText = "💡 " + specificHint;
        }

        function handleGuess(letter, btnElement) {
            if (mistakes >= 6 || currentLetterIndex >= currentWord.length) return;

            if (letter === currentWord[currentLetterIndex]) {
                currentLetterIndex++;
                mistakesOnCurrentLetter = 0; 
                document.getElementById('clueDisplay').style.display = "none"; 
                updateWordDisplay();
            } else {
                mistakes++;
                mistakesOnCurrentLetter++;
                if (!wordFailedThisRound) wordFailedThisRound = true;
                
                // Show hint immediately on the 2nd mistake for the same letter
                if (mistakesOnCurrentLetter >= 2) triggerHint();
                
                updateLivesDisplay();
            }
        }

        function buildKeyboard() {
            const keyboardDiv = document.getElementById('keyboard');
            keyboardDiv.innerHTML = ''; 
            "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('').forEach(letter => {
                let btn = document.createElement('button');
                btn.className = 'key'; btn.innerText = letter;
                btn.onclick = () => handleGuess(letter, btn);
                keyboardDiv.appendChild(btn);
            });
        }

        function processNext() {
            if (isFirstPass && !wordFailedThisRound) firstTryPerfectCount++;
            if (wordFailedThisRound) missedWordsQueue.push({ word: currentWord });

            currentWordIndex++;
            if (currentWordIndex >= currentQueue.length) {
                isFirstPass = false;
                if (missedWordsQueue.length > 0) startReviewPhase();
                else showEndScreen();
            } else {
                loadWord();
            }
        }

        // --- REVIEW PHASE ---
        let reviewIndex = 0;

        function startReviewPhase() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('reviewArea').style.display = 'block';
            reviewIndex = 0;
            loadReviewWord();
        }

        function loadReviewWord() {
            document.getElementById('nextReviewBtn').style.display = 'none';
            let currentReview = missedWordsQueue[reviewIndex];
            currentWord = currentReview.word.toUpperCase(); 
            
            let options = new Set([currentWord]);
            let vowels = "AEIOU".split("");
            let expectedLetter = currentWord[0];
            let pool = vowels.includes(expectedLetter) ? vowels : "BCDFGHJKLMNPQRSTVWXYZ".split("");
            pool = pool.sort(() => 0.5 - Math.random());
            for (let char of pool) {
                if (options.size >= 4) break; 
                if (char !== expectedLetter) options.add(currentWord.substring(0, 0) + char + currentWord.substring(1));
            }
            let optionArray = Array.from(options).sort(() => 0.5 - Math.random());

            const optionsDiv = document.getElementById('reviewOptions');
            optionsDiv.innerHTML = '';
            optionArray.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'review-btn'; btn.innerText = opt;
                btn.onclick = () => checkReviewAnswer(opt, currentWord, btn);
                optionsDiv.appendChild(btn);
            });

            let wordLower = currentWord.toLowerCase();
            currentAudio = new Audio(`audio/${wordLower}.wav`);
            playCurrentAudio();
        }

        function checkReviewAnswer(selected, correct, btnElement) {
            let allBtns = document.querySelectorAll('.review-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); 
            if (selected === correct) {
                btnElement.classList.add('correct-choice');
            } else {
                btnElement.classList.add('wrong-choice');
                allBtns.forEach(b => { if (b.innerText === correct) b.classList.add('correct-choice'); });
            }
            document.getElementById('nextReviewBtn').style.display = 'block';
        }

        function nextReview() {
            reviewIndex++;
            if (reviewIndex >= missedWordsQueue.length) {
                currentQueue = missedWordsQueue.map(item => item.word);
                startSpellingPhase();
            } else {
                loadReviewWord();
            }
        }

        function showEndScreen() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('reviewArea').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';
            document.getElementById('reportScore').innerText = `${firstTryPerfectCount} / ${totalWordsToSpell}`;
            document.getElementById('reportMessage').innerText = firstTryPerfectCount === totalWordsToSpell ? "🌟 Flawless!" : "💪 Great effort! Keep practicing!";
        }
    </script>
</body>
</html>
