<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Myo-Therapy Routine</title>
    <style>
        body { 
            font-family: 'Comic Sans MS', Arial, sans-serif; 
            padding: 20px; 
            background-color: #e0f7fa; 
            text-align: center; 
            color: #333;
            touch-action: manipulation;
        }
        h1 { color: #00838f; font-size: 36px; margin-bottom: 5px; }
        .card { 
            background-color: white; 
            padding: 30px; 
            border-radius: 20px; 
            margin: 20px auto; 
            max-width: 600px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.15); 
        }
        button { 
            color: white; 
            padding: 20px; 
            font-size: 24px; 
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px;
            width: 100%;
            max-width: 400px;
        }
        button:active { 
            transform: translateY(5px); 
            box-shadow: none !important; 
        }
        
        .btn-start { background-color: #00bcd4; box-shadow: 0 5px 0 #00838f; padding: 25px; font-size: 28px; }
        .btn-menu-item { background-color: #ffffff; color: #00838f; border: 2px solid #00bcd4; box-shadow: 0 4px 0 #b2ebf2; padding: 15px; font-size: 20px; }
        
        .btn-go { background-color: #ff9800; box-shadow: 0 5px 0 #e65100; display: none; font-size: 36px; }
        .btn-next { background-color: #4caf50; box-shadow: 0 5px 0 #2e7d32; display: none; }
        .btn-skip { background-color: #9e9e9e; box-shadow: 0 5px 0 #757575; margin-top: 10px; font-size: 20px; }
        
        #routineArea, #endScreen { display: none; }
        #exerciseTitle { font-size: 36px; color: #ff6f00; margin-bottom: 20px; min-height: 50px; }
        #instructionText { font-size: 24px; color: #555; margin-bottom: 30px; min-height: 80px; }
        
        #timerDisplay { font-size: 80px; font-weight: bold; color: #d32f2f; margin: 20px 0; font-family: monospace; display: none; }
        #audioStatus { font-size: 20px; color: #00838f; font-weight: bold; margin: 20px 0; display: none; animation: pulse 1.5s infinite; }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .progress-bar {
            width: 100%;
            background-color: #eceff1;
            border-radius: 10px;
            margin-top: 20px;
            height: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #00bcd4;
            width: 0%;
            transition: width 0.3s;
        }
        
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>👅 Myo-Therapy</h1>

    <div id="startScreen" class="card">
        <h2>Ready for your exercises?</h2>
        <p style="font-size: 20px; color: #666; margin-bottom: 25px;">Turn your volume up!</p>
        <button class="btn-start" onclick="startRoutine(0)">▶️ Start Full Routine</button>
        
        <hr style="margin: 30px 0; border: 1px solid #e0f7fa;">
        <h3 style="color: #00838f;">Or jump to an exercise:</h3>
        <div id="menuGrid" style="display: flex; flex-direction: column; gap: 10px; align-items: center;">
            </div>
    </div>

    <div id="routineArea" class="card">
        <h2 id="exerciseTitle">Exercise Title</h2>
        <div id="instructionText">Instructions will appear here.</div>
        
        <div id="audioStatus">🔊 Listen to instructions...</div>
        <div id="timerDisplay">00:00</div>
        
        <div class="button-group">
            <button id="goBtn" class="btn-go" onclick="startAction()">🟢 GO!</button>
            <button id="nextBtn" class="btn-next" onclick="nextExercise()">Next Exercise ➡️</button>
            <button id="skipBtn" class="btn-skip" onclick="skipExercise()">⏭️ Skip / Exit Early</button>
        </div>
        
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
        </div>
        <p id="stepCounter" style="color: #888; margin-top: 10px;">Step 1 of 9</p>
        
        <button style="background: none; color: #00bcd4; box-shadow: none; font-size: 16px; margin-top: 20px;" onclick="location.reload()">🏠 Back to Menu</button>
    </div>

    <div id="endScreen" class="card">
        <h1 style="font-size: 50px;">🎉 All Done! 🎉</h1>
        <h2>Great job completing your therapy!</h2>
        <button class="btn-start" onclick="location.reload()">🔄 Back to Menu</button>
    </div>

    <script>
        // The Routine Database
        const routine = [
            {
                title: "Toothbrush / Foam Brush",
                instruction: "Rub your tip of tongue, rub your spot palate with the foam brush, place tongue tip on spot, close your teeth and lips and breathe through your nose 3 times.",
                audio: "audio/01_toothbrush.mp3",
                type: "manual"
            },
            {
                title: "Parents Delight / Lip Stick",
                instruction: "Get ready for Parent's Delight. Put on your lip stick, close your lips gently, and hold this perfect posture for 5 minutes.",
                audio: "audio/02_parents_delight.mp3",
                type: "timer",
                timeInSeconds: 300
            },
            {
                title: "Slow Clicks",
                instruction: "Time for slow clicks. Suction your tongue completely to the roof of your mouth, open wide, and click. Do this slowly for 2 minutes.",
                audio: "audio/03_slow_clicks.mp3",
                type: "timer",
                timeInSeconds: 120
            },
            {
                title: "The Tiny Oyster",
                instruction: "Get ready for The Tiny Oyster. Hold that tongue tight!",
                audio: "audio/04_tiny_oyster.mp3",
                type: "countdown",
                timeInSeconds: 10
            },
            {
                title: "Fat Tongue / Skinny Tongue",
                instruction: "Let's do Fat Tongue, Skinny Tongue. Stretch it out wide, then make it pointy.",
                audio: "audio/05_fat_tongue.mp3",
                type: "countdown",
                timeInSeconds: 10
            },
            {
                title: "K & G Sounds",
                instruction: "Time for K and G sounds. Keep your tongue tip down and use the back of your tongue. Kah. Gah.",
                audio: "audio/06_kg_sounds.mp3",
                type: "countdown",
                timeInSeconds: 10
            },
            {
                title: "Elastic Hold",
                instruction: "Time for the elastic hold. Place the elastic on your tongue tip, find your spot, and swallow. We will hold this for 15 minutes.",
                audio: "audio/07_elastic_hold.mp3",
                type: "timer",
                timeInSeconds: 900
            },
            {
                title: "The Shrimp's Walk",
                instruction: "Get ready for The Shrimp's Walk. Let's do this perfectly.",
                audio: "audio/08_shrimps_walk.mp3",
                type: "countdown",
                timeInSeconds: 10
            },
            {
                title: "Tongue Points",
                instruction: "Last exercise! Tongue points. Make your tongue as sharp and pointy as you can.",
                audio: "audio/09_tongue_points.mp3",
                type: "manual"
            }
        ];

        let currentIndex = 0;
        let timerInterval;
        let currentAudioPlayer = null;
        let preferredVoice = null;

        // Build the dynamic menu on load
        window.onload = function() {
            let menuGrid = document.getElementById('menuGrid');
            routine.forEach((ex, index) => {
                let btn = document.createElement('button');
                btn.className = 'btn-menu-item';
                btn.innerText = `${index + 1}. ${ex.title}`;
                btn.onclick = () => startRoutine(index);
                menuGrid.appendChild(btn);
            });
        };

        function loadVoices() {
            let voices = window.speechSynthesis.getVoices();
            preferredVoice = voices.find(v => v.name.includes("Google US English")) || voices.find(v => v.name.includes("Samantha")) || voices[0];
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        } else {
            loadVoices();
        }

        // Fire-and-forget speech function (fixes iOS freezing)
        function speakCountdown(text) {
            window.speechSynthesis.cancel();
            let utterance = new SpeechSynthesisUtterance(text);
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.rate = 0.8; 
            window.speechSynthesis.speak(utterance);
        }

        function playAudio(filename, onEndCallback) {
            stopMedia();
            currentAudioPlayer = new Audio(filename);
            
            if (onEndCallback) {
                currentAudioPlayer.onended = onEndCallback;
            }
            
            currentAudioPlayer.play().catch(e => {
                console.error("Could not play audio:", filename);
                if (onEndCallback) setTimeout(onEndCallback, 1500); 
            });
        }

        function stopMedia() {
            clearInterval(timerInterval);
            if (currentAudioPlayer) {
                currentAudioPlayer.pause();
                currentAudioPlayer.currentTime = 0;
            }
            window.speechSynthesis.cancel();
        }

        function startRoutine(startIndex) {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('routineArea').style.display = 'block';
            
            // iOS audio unlock
            let dummy = new SpeechSynthesisUtterance("");
            dummy.volume = 0;
            window.speechSynthesis.speak(dummy);

            currentIndex = startIndex;
            loadExercise();
        }

        function loadExercise() {
            stopMedia();
            document.getElementById('goBtn').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('skipBtn').style.display = 'block';
            document.getElementById('timerDisplay').style.display = 'none';
            document.getElementById('audioStatus').style.display = 'block';
            
            let current = routine[currentIndex];
            
            document.getElementById('exerciseTitle').innerText = current.title;
            document.getElementById('instructionText').innerText = current.instruction;
            document.getElementById('stepCounter').innerText = `Step ${currentIndex + 1} of ${routine.length}`;
            
            let progressPct = ((currentIndex) / routine.length) * 100;
            document.getElementById('progressFill').style.width = progressPct + '%';

            playAudio(current.audio, () => {
                document.getElementById('audioStatus').style.display = 'none';
                if (current.type === "manual") {
                    document.getElementById('nextBtn').style.display = 'block';
                } else {
                    document.getElementById('goBtn').style.display = 'block';
                }
            });
        }

        function startAction() {
            document.getElementById('goBtn').style.display = 'none';
            let current = routine[currentIndex];
            
            if (current.type === "timer") {
                startVisualTimer(current.timeInSeconds);
            } 
            else if (current.type === "countdown") {
                startRobustCountdown(current.timeInSeconds);
            }
        }

        function startVisualTimer(totalSeconds) {
            let timerEl = document.getElementById('timerDisplay');
            timerEl.style.display = 'block';
            
            let timeLeft = totalSeconds;
            updateTimerDisplay(timeLeft);
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay(timeLeft);
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    playAudio("audio/timer_done.mp3");
                    document.getElementById('nextBtn').style.display = 'block';
                }
            }, 1000);
        }

        function updateTimerDisplay(seconds) {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            document.getElementById('timerDisplay').innerText = 
                (m < 10 ? "0" : "") + m + ":" + (s < 10 ? "0" : "") + s;
        }

        // New iOS-safe robust countdown using standard javascript timing
        function startRobustCountdown(startNum) {
            let timerEl = document.getElementById('timerDisplay');
            timerEl.style.display = 'block';
            
            let currentNum = startNum;
            timerEl.innerText = currentNum;
            speakCountdown(currentNum.toString());

            timerInterval = setInterval(() => {
                currentNum--;
                if (currentNum > 0) {
                    timerEl.innerText = currentNum;
                    speakCountdown(currentNum.toString());
                } else {
                    clearInterval(timerInterval);
                    timerEl.innerText = "0";
                    playAudio("audio/timer_done.mp3"); 
                    document.getElementById('nextBtn').style.display = 'block';
                }
            }, 1200); // Wait 1.2 seconds between numbers to ensure clear speech pacing
        }

        function skipExercise() {
            nextExercise();
        }

        function nextExercise() {
            stopMedia();
            currentIndex++;
            if (currentIndex >= routine.length) {
                document.getElementById('routineArea').style.display = 'none';
                document.getElementById('endScreen').style.display = 'block';
                playAudio("audio/all_done.mp3");
            } else {
                loadExercise();
            }
        }
    </script>
</body>
</html>
