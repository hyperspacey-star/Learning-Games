<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Spelling Tutor</title>
    <style>
        body { font-family: 'Comic Sans MS', Arial, sans-serif; padding: 20px; background-color: #f0f8ff; text-align: center; }
        h1 { color: #ff4500; font-size: 36px; margin-bottom: 5px; }
        .card { background-color: white; padding: 30px; border-radius: 15px; margin: 20px auto; max-width: 700px; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        .btn-start { background-color: #d84315; color: white; padding: 20px 40px; font-size: 28px; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; margin-top: 30px; box-shadow: 0 5px 0 #bf360c; }
        .btn-start:active { transform: translateY(5px); box-shadow: none; }
        .btn-audio { background-color: #2196f3; color: white; padding: 15px 25px; font-size: 24px; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .btn-audio:disabled { background-color: #90caf9; cursor: not-allowed; box-shadow: none; transform: none; }
        .mode-badge { background-color: #9c27b0; color: white; padding: 5px 15px; border-radius: 20px; font-size: 16px; font-weight: bold; letter-spacing: 2px; display: inline-block; margin-bottom: 10px; }
        #wordDisplay { font-size: 60px; font-weight: bold; color: #4b0082; letter-spacing: 4px; min-height: 90px; margin: 20px 0; }
        #message { font-size: 28px; font-weight: bold; margin-top: 10px; min-height: 40px; color: #ff9800; }
        #clueDisplay { font-size: 24px; font-weight: bold; color: #1976d2; min-height: 35px; margin-top: 5px; padding: 10px; background: #e3f2fd; border-radius: 10px; display: none; }
        #livesDisplay { font-size: 30px; margin-bottom: 15px; }
        .key { background-color: #e0e0e0; border: 2px solid #ccc; border-radius: 8px; font-size: 24px; padding: 10px 15px; margin: 5px; cursor: pointer; font-weight: bold; }
        .key:active { background-color: #d0d0d0; }
        .flash-correct { background-color: #4caf50 !important; color: white; border-color: #388e3c; }
        .flash-wrong { background-color: #f44336 !important; color: white; border-color: #d32f2f; }
        #gameArea, #reviewArea, #endScreen { display: none; }
        
        /* Review Phase Styles */
        .review-btn { display: block; width: 80%; max-width: 400px; margin: 15px auto; padding: 20px; font-size: 32px; background-color: #e3f2fd; border: 3px solid #2196f3; color: #0d47a1; border-radius: 15px; cursor: pointer; font-family: monospace; font-weight: bold; box-shadow: 0 5px 0 #1976d2; transition: transform 0.1s; text-transform: uppercase; letter-spacing: 5px; }
        
        /* Report Card Styles */
        .report-card { border: 4px dashed #4caf50; padding: 20px; border-radius: 15px; background: #f1f8e9; margin: 20px 0; }
        .report-score { font-size: 48px; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>

    <div class="card" id="startScreen">
        <div class="mode-badge">🤖 AI TUTOR MODE</div>
        <h1>🎧 Listen & Spell!</h1>
        <p style="font-size: 20px; color: #555;">Miss AI is ready! Make sure your volume is turned up.</p>
        <button class="btn-start" onclick="startGame()">Start Game! ▶️</button>
    </div>

    <div class="card" id="gameArea">
        <div id="livesDisplay">❤️❤️❤️❤️❤️❤️</div>
        <button class="btn-audio" id="audioBtn" onclick="playCurrentAudio()">🔊 Listen to Word</button>
        <div id="wordDisplay">_ _ _ _ _</div>
        <div id="clueDisplay"></div>
        <div id="message"></div>
        <div id="keyboard"></div>
        <button id="nextBtn" class="btn-start" style="display: none; margin: auto; margin-top: 20px; background-color: #4caf50; box-shadow: 0 5px 0 #2e7d32;" onclick="processNext()">Next Word ➡️</button>
    </div>

    <div class="card" id="reviewArea">
        <h1>🔍 Visual Review</h1>
        <p style="font-size: 24px; color: #555;">Let's review! Which one is spelled correctly?</p>
        <button class="btn-audio" id="reviewAudioBtn" onclick="playCurrentAudio()">🔊 Listen to Word</button>
        <div id="reviewOptions"></div>
        <button id="nextReviewBtn" class="btn-start" style="display: none; margin: auto; margin-top: 20px; background-color: #4caf50; box-shadow: 0 5px 0 #2e7d32;" onclick="nextReview()">Continue ➡️</button>
    </div>

    <div class="card" id="endScreen">
        <h1>🎉 Practice Complete! 🎉</h1>
        <div class="report-card">
            <h2>Parent Report Card</h2>
            <p style="font-size: 18px; color: #555;">Perfect on the very first try:</p>
            <div class="report-score" id="reportScore">0 / 0</div>
            <p style="font-size: 16px; margin-top: 10px;" id="reportMessage"></p>
        </div>
        <button class="btn-start" onclick="location.reload()">Play Again 🔄</button>
    </div>

    <script>
        // === YOUR VERCEL CONNECTION ===
        // Change this URL to your actual Vercel project domain!
        const VERCEL_URL = "abi-s-learning-games.vercel.app";
        
        let initialWords = ["amount", "boundary", "moisture", "voyage", "sweater"]; // Put your Summer List here!

        let currentQueue = [];
        let missedWordsQueue = [];         
        let currentWordIndex = 0;
        let currentWord = "";
        let currentAttempt = ""; // Tracks what she typed to send to the AI
        let currentLetterIndex = 0;         
        let mistakes = 0;
        let mistakesOnCurrentLetter = 0;
        let wordFailedThisRound = false;
        
        // Report Card Tracking
        let totalWordsToSpell = initialWords.length;
        let firstTryPerfectCount = 0;
        let isFirstPass = true; // Tells us if we are on the original list or the review queue

        let currentAudioData = null; // Holds the AI generated base64 audio
        let audioCtx; 

        function startGame() {
            currentQueue = [...initialWords];
            window.AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            startSpellingPhase();
        }

        function startSpellingPhase() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('reviewArea').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            currentWordIndex = 0;
            missedWordsQueue = [];
            loadWord();
        }

        async function loadWord() {
            currentWord = currentQueue[currentWordIndex].toUpperCase();
            currentLetterIndex = 0;
            currentAttempt = "";
            mistakes = 0;
            mistakesOnCurrentLetter = 0;
            wordFailedThisRound = false;
            
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('message').innerText = "";
            document.getElementById('clueDisplay').style.display = "none";
            document.getElementById('clueDisplay').innerText = "";
            document.getElementById('keyboard').style.pointerEvents = "auto";
            
            updateLivesDisplay();
            updateWordDisplay();
            buildKeyboard();

            // Fetch the AI Voice Audio for this word immediately
            document.getElementById('audioBtn').innerText = "⏳ Loading Voice...";
            document.getElementById('audioBtn').disabled = true;
            
            try {
                const response = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'dictate', word: currentWord.toLowerCase() })
                });
                const data = await response.json();
                currentAudioData = "data:audio/mp3;base64," + data.audio;
                
                document.getElementById('audioBtn').innerText = "🔊 Listen to Word";
                document.getElementById('audioBtn').disabled = false;
                playCurrentAudio(); // Auto-play when ready
            } catch(e) {
                document.getElementById('audioBtn').innerText = "⚠️ Connection Error";
                console.error("Vercel connection failed: ", e);
            }
        }

        function playCurrentAudio() {
            if(currentAudioData) {
                let audio = new Audio(currentAudioData);
                audio.play();
            }
        }

        // --- Basic Synth Sounds ---
        function playTone(type, freq, dur) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = type; 
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime); 
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.start();
            osc.stop(audioCtx.currentTime + dur);
        }
        function playDing() { playTone('sine', 1000, 0.3); }
        function playWrongBuzz() { playTone('sawtooth', 150, 0.2); }

        function updateWordDisplay() {
            let displayString = "";
            for (let i = 0; i < currentWord.length; i++) {
                if (i < currentLetterIndex) displayString += (currentWord[i] === " " ? "\xa0\xa0" : currentWord[i]) + " ";
                else displayString += "_ ";
            }
            document.getElementById('wordDisplay').innerText = displayString.trim();

            if (currentLetterIndex === currentWord.length) {
                document.getElementById('message').innerText = wordFailedThisRound ? "We'll practice this one again later!" : "✅ Perfect!";
                document.getElementById('message').style.color = wordFailedThisRound ? "#f57f17" : "#4caf50";
                document.getElementById('keyboard').style.pointerEvents = "none";
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        function updateLivesDisplay() {
            let livesLeft = 6 - mistakes;
            let heartString = "";
            for(let i=0; i<livesLeft; i++) heartString += "❤️";
            for(let i=0; i<mistakes; i++) heartString += "🖤";
            document.getElementById('livesDisplay').innerText = heartString;

            if (livesLeft <= 0) {
                document.getElementById('message').innerText = "❌ We will definitely practice this one again!";
                document.getElementById('message').style.color = "#f44336";
                document.getElementById('keyboard').style.pointerEvents = "none";
                document.getElementById('wordDisplay').innerText = currentWord.split('').join(' ');
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        async function triggerAITutor(expectedLetter) {
            let clueDiv = document.getElementById('clueDisplay');
            clueDiv.style.display = "block";
            clueDiv.innerText = "🤖 Miss AI is thinking...";
            document.getElementById('keyboard').style.pointerEvents = "none"; // Pause typing

            try {
                const response = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'hint', 
                        word: currentWord.toLowerCase(), 
                        attempt: currentAttempt.toLowerCase() 
                    })
                });
                const data = await response.json();
                clueDiv.innerText = "💡 " + data.hint;
                
                // Play Miss AI's voice
                let hintAudio = new Audio("data:audio/mp3;base64," + data.audio);
                hintAudio.play();
                
                document.getElementById('keyboard').style.pointerEvents = "auto"; // Resume typing
            } catch(e) {
                clueDiv.innerText = "💡 Hint: Try sounding out the next letter carefully!";
                document.getElementById('keyboard').style.pointerEvents = "auto";
            }
        }

        function handleGuess(letter, btnElement) {
            if (mistakes >= 6 || currentLetterIndex >= currentWord.length) return;

            let expectedLetter = currentWord[currentLetterIndex];
            currentAttempt += letter; // Log her attempt for the AI

            if (letter === expectedLetter) {
                playDing();
                btnElement.classList.add('flash-correct');
                setTimeout(() => { btnElement.classList.remove('flash-correct'); }, 300);
                
                currentLetterIndex++;
                mistakesOnCurrentLetter = 0; 
                document.getElementById('clueDisplay').style.display = "none"; 
                updateWordDisplay();
            } else {
                playWrongBuzz();
                btnElement.classList.add('flash-wrong');
                setTimeout(() => { btnElement.classList.remove('flash-wrong'); }, 300);
                
                if (!wordFailedThisRound) wordFailedThisRound = true;
                
                mistakes++;
                mistakesOnCurrentLetter++;
                
                if (mistakesOnCurrentLetter >= 2 && mistakes < 6) {
                    triggerAITutor(expectedLetter); // Trigger Vercel AI!
                }
                updateLivesDisplay();
            }
        }

        function buildKeyboard() {
            const keyboardDiv = document.getElementById('keyboard');
            keyboardDiv.innerHTML = ''; 
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let i = 0; i < alphabet.length; i++) {
                let letter = alphabet[i];
                let btn = document.createElement('button');
                btn.className = 'key'; btn.innerText = letter;
                btn.onclick = () => handleGuess(letter, btn);
                keyboardDiv.appendChild(btn);
            }
        }

        function processNext() {
            // === REPORT CARD TRACKING LOGIC ===
            if (isFirstPass && !wordFailedThisRound) {
                firstTryPerfectCount++;
            }

            if (wordFailedThisRound) {
                missedWordsQueue.push({ word: currentWord, errorIndex: 0 });
            }

            currentWordIndex++;
            if (currentWordIndex >= currentQueue.length) {
                isFirstPass = false; // We finished the main list!
                if (missedWordsQueue.length > 0) {
                    startReviewPhase();
                } else {
                    showEndScreen();
                }
            } else {
                loadWord();
            }
        }

        // --- Review Phase ---
        let reviewIndex = 0;

        function startReviewPhase() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('reviewArea').style.display = 'block';
            reviewIndex = 0;
            loadReviewWord();
        }

        async function loadReviewWord() {
            document.getElementById('nextReviewBtn').style.display = 'none';
            let currentReview = missedWordsQueue[reviewIndex];
            currentWord = currentReview.word.toUpperCase(); 
            
            // Generate simple distractors
            let options = new Set([currentWord]);
            let vowels = "AEIOU".split("");
            let expectedLetter = currentWord[0];
            let pool = vowels.includes(expectedLetter) ? vowels : "BCDFGHJKLMNPQRSTVWXYZ".split("");
            pool = pool.sort(() => 0.5 - Math.random());
            for (let char of pool) {
                if (options.size >= 4) break; 
                if (char !== expectedLetter) options.add(currentWord.substring(0, 0) + char + currentWord.substring(1));
            }
            let optionArray = Array.from(options).sort(() => 0.5 - Math.random());

            const optionsDiv = document.getElementById('reviewOptions');
            optionsDiv.innerHTML = '';
            optionArray.forEach(opt => {
                let btn = document.createElement('button');
                btn.className = 'review-btn'; btn.innerText = opt;
                btn.onclick = () => checkReviewAnswer(opt, currentWord, btn);
                optionsDiv.appendChild(btn);
            });

            // Fetch audio for review word
            document.getElementById('reviewAudioBtn').innerText = "⏳ Loading...";
            try {
                const response = await fetch(VERCEL_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'dictate', word: currentWord.toLowerCase() })
                });
                const data = await response.json();
                currentAudioData = "data:audio/mp3;base64," + data.audio;
                document.getElementById('reviewAudioBtn').innerText = "🔊 Listen to Word";
                playCurrentAudio();
            } catch(e) { }
        }

        function checkReviewAnswer(selected, correct, btnElement) {
            let allBtns = document.querySelectorAll('.review-btn');
            allBtns.forEach(b => b.style.pointerEvents = 'none'); 
            if (selected === correct) {
                playDing();
                btnElement.classList.add('correct-choice');
            } else {
                playWrongBuzz();
                btnElement.classList.add('wrong-choice');
                allBtns.forEach(b => { if (b.innerText === correct) b.classList.add('correct-choice'); });
            }
            document.getElementById('nextReviewBtn').style.display = 'block';
        }

        function nextReview() {
            reviewIndex++;
            if (reviewIndex >= missedWordsQueue.length) {
                currentQueue = missedWordsQueue.map(item => item.word);
                startSpellingPhase();
            } else {
                loadReviewWord();
            }
        }

        // --- End Screen & Report Card ---
        function showEndScreen() {
            document.getElementById('gameArea').style.display = 'none';
            document.getElementById('reviewArea').style.display = 'none';
            document.getElementById('endScreen').style.display = 'block';

            // Populate Report Card
            document.getElementById('reportScore').innerText = `${firstTryPerfectCount} / ${totalWordsToSpell}`;
            
            let message = "";
            let percentage = firstTryPerfectCount / totalWordsToSpell;
            if(percentage === 1) message = "🌟 Flawless! Incredible memory!";
            else if (percentage >= 0.8) message = "🚀 Amazing job! Almost perfect!";
            else message = "💪 Great practice session!";
            
            document.getElementById('reportMessage').innerText = message;
        }
    </script>
</body>
</html>
